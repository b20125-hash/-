<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>슬기로운 이화 생활 - 이화의 서재</title>
  <style>
    body {
   
  background-image: url('https://tnegcagbfvaetydppjbg.supabase.co/storage/v1/object/public/images/bg.jpg.png'); /* 👈 배경 이미지 지정 */
  background-size: cover;          /* 화면에 꽉 차게 조절 */
  background-position: center;      /* 가운데 정렬 */
  background-attachment: fixed;     /* 스크롤 해도 배경 고정 */
  background-repeat: no-repeat;     /* 이미지 반복 방지 */
  font-family: 'Malgun Gothic', sans-serif;
  text-align: center;
  padding: 20px;
  margin: 0;
}
    
   .container { 
      max-width: 800px; 
      margin: 40px auto; 
      background: rgba(252, 249, 242, 0.96); 
      padding: 35px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    
    /* 카테고리 박스 스타일링 */
    .category-section {
      background: white; padding: 20px; border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: left;
    }
    .category-title { font-weight: bold; margin-bottom: 10px; color: #4A7051; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; }
    .checkbox-label {
      background: #f0f0f0; padding: 6px 12px; border-radius: 20px; cursor: pointer;
      font-size: 14px; transition: 0.2s; user-select: none;
    }
    /* 체크박스는 숨기고 라벨을 버튼처럼 디자인 */
    .checkbox-group input[type="checkbox"] { display: none; }
    .checkbox-group input[type="checkbox"]:checked + .checkbox-label {
      background: #4A7051; color: white; font-weight: bold;
    }

    button.recommend-btn {
      padding: 12px 30px; font-size: 16px; font-weight: bold;
      background-color: #4A7051; color: white; border: none;
      border-radius: 5px; cursor: pointer; margin-top: 10px;
    }
    button.recommend-btn:hover { background-color: #3b5941; }
    
    /* 책꽂이 UI */
    .bookshelf {
      display: flex; justify-content: center; gap: 20px;
      margin-top: 40px; border-bottom: 15px solid #8B5A2B; padding-bottom: 10px; min-height: 190px;
    }
    .book {
      width: 120px; height: 180px; color: white; padding: 15px 10px;
      writing-mode: vertical-rl; text-orientation: mixed;
      cursor: pointer; border-radius: 3px 5px 5px 3px;
      box-shadow: 5px 5px 10px rgba(0,0,0,0.2); font-weight: bold;
      overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center;
    }
    .book:hover { transform: scale(1.05); transition: 0.2s; }

    /* 모달창 */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10;
    }
    .modal-content {
      background: white; max-width: 500px; width: 90%;
      border-radius: 10px; text-align: left; padding: 25px; position: relative;
    }
    .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 20px; }
    .book-img { float: left; margin-right: 15px; width: 100px; }
  
    /* 로그인 화면 디자인 */
    .login-container {
      display: none; /* 초기 상태는 자바스크립트 상태 확인 후 보여주기 위해 변경 */
      flex-direction: column; justify-content: center; align-items: center;
      height: 100vh;
      background-color: #fcf9f2;
    }
    .google-login-btn {
      padding: 15px 30px; font-size: 16px; font-weight: bold;
      background-color: #ffffff; color: #444; border: 1px solid #ddd;
      border-radius: 8px; cursor: pointer; margin-top: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;
    }
    .google-login-btn:hover { background-color: #f1f1f1; }
    /* --- 책 상세정보 모달창 디자인 --- */
.modal {
  display: none; /* 평소에는 숨겨둠 */
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.5); /* 배경을 반투명한 검은색으로 */
}

.modal-content {
  background-color: #fdfdfd;
  margin: 10% auto;
  padding: 30px;
  border-radius: 15px;
  width: 70%;
  max-width: 500px;
  position: relative;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.close-button {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 28px;
  font-weight: bold;
  color: #666;
  cursor: pointer;
}

.modal-cover {
  width: 120px;
  border-radius: 5px;
  float: left; /* 이미지는 왼쪽에, 글씨는 오른쪽에 오도록 */
  margin-right: 20px;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
}

/* 기획서에 명시된 난이도 표시용 뱃지 디자인 */
.badge-level {
  background-color: #3b5f41; /* 이화여대 상징색 느낌 */
  color: white;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
}

.modal-description {
  clear: both; /* 이미지 아래로 줄거리가 내려오도록 설정 */
  padding-top: 15px;
  line-height: 1.6;
}
  </style>
</head>
<body>
  <!-- 1. 로그인 화면 -->
  <div id="loginPage" class="login-container">
    <h2>📚 이화의 서재</h2>
    <p>이화 학생들만 이용할 수 있는 도서 추천 서비스입니다.<br>학교 구글 계정(@ewha.hs.kr)으로 로그인해 주세요.</p>
    <button class="google-login-btn" onclick="handleLogin()">학교 계정으로 로그인</button>
  </div>

  <!-- 2. 메인 화면 -->
  <div class="container" id="mainPage" style="display: none;">
    <div style="text-align: right; margin-bottom: 10px;">
        <button onclick="openMyPage()" style="background:none; border:none; color:#4A7051; font-weight:bold; cursor:pointer; margin-right: 15px; font-size: 15px;">👤 마이페이지</button>
        <button onclick="handleLogout()" style="background:none; border:none; color:#888; text-decoration:underline; cursor:pointer; font-size: 15px;">로그아웃</button>
    </div>
    <h2>📚 슬기로운 이화 생활: 이화의 서재</h2>
    <p>관심 있는 계열과 세부 전공을 선택해 주세요. (각각 최대 2개 선택 가능)</p>

    <div class="category-section">
      <div class="category-title">1. 대표 계열 선택</div>
      <div class="checkbox-group" id="mainCategoryGroup">
        <input type="checkbox" id="main_med" value="의학계열" onchange="updateSubCategories()"><label class="checkbox-label" for="main_med">의학계열</label>
        <input type="checkbox" id="main_hum" value="인문사회계열" onchange="updateSubCategories()"><label class="checkbox-label" for="main_hum">인문사회계열</label>
        <input type="checkbox" id="main_nat" value="자연계열" onchange="updateSubCategories()"><label class="checkbox-label" for="main_nat">자연계열</label>
        <input type="checkbox" id="main_eng" value="공학계열" onchange="updateSubCategories()"><label class="checkbox-label" for="main_eng">공학계열</label>
        <input type="checkbox" id="main_art" value="예체능계열" onchange="updateSubCategories()"><label class="checkbox-label" for="main_art">예체능계열</label>
        <input type="checkbox" id="main_edu" value="교육계열" onchange="updateSubCategories()"><label class="checkbox-label" for="main_edu">교육계열</label>
      </div>

      <div class="category-title">2. 세부 전공 선택</div>
      <div class="checkbox-group" id="subCategoryGroup">
        <span style="color:#aaa; font-size:14px;">먼저 계열을 선택해 주세요.</span>
      </div>
    </div>

    <button class="recommend-btn" onclick="getRecommendations()">책 추천받기</button>
    <div class="bookshelf" id="bookshelf"></div>
  </div>

  <!-- 모달창 -->
  <div class="modal" id="bookModal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <img id="modalImg" class="book-img" src="" alt="책 표지">
      <h3 id="modalTitle">책 제목</h3>
      <p><strong>저자:</strong> <span id="modalAuthors"></span> | <strong>출판사:</strong> <span id="modalPublisher"></span></p>
      <hr>
      <p id="modalContents">줄거리 요약</p>
    </div>
  </div>

  <!-- 💡 여기에 Supabase 브라우저용 라이브러리를 추가했습니다 -->
  <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
  <script>
    // ⚠️ Supabase 주소와 Anon 키를 알맞게 채워주세요
    const SUPABASE_URL = 'https://tnegcagbfvaetydppjbg.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuZWdjYWdiZnZhZXR5ZHBwamJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0ODQ0MjYsImV4cCI6MjA5OTA2MDQyNn0.C6X07v8AASRv2cMSeZ9eq1nljP02f0H9u7nA6hIVkWg';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let recommendedBooks = []; 

    const majorData = {
      "의학계열": ["의학", "약학", "간호", "수의학", "한의예", "치의예"],
      "인문사회계열": ["경영", "경제", "미디어", "역사", "상담심리"],
      "자연계열": ["생명", "환경", "물리", "화학", "지구"],
      "공학계열": ["컴퓨터공학", "소프트웨어 공학", "기계공학", "로봇공학", "전기전자공학", "화학공학"],
      "예체능계열": ["음악", "미술", "체육"],
      "교육계열": ["초등교육", "중등교육", "특수교육", "유아교육"]
    };

    // [기능 6 - 수정] 진짜 Supabase 구글 로그인 트리거 연동
    async function handleLogin() {
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          // 구글 로그인이 완료된 후 현재 내 페이지 주소로 다시 돌아오도록 세팅합니다.
          redirectTo: window.location.href 
        }
      });
      if (error) {
        alert("로그인 처리 중 에러가 발생했습니다: " + error.message);
      }
    }

    // [새 기능 추가] 구글 로그인 후 돌아왔을 때 유저 계정이 @ewha.hs.kr 인지 진짜로 검사하기
    async function checkUserSession() {
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (session && session.user) {
        const userEmail = session.user.email;

        // 학교 도메인 확인 검사[cite: 1]
        if (userEmail && userEmail.endsWith('@ewha.hs.kr')) {
          // 일치할 경우: 메인 추천 웹 화면 열기[cite: 1]
          document.getElementById('loginPage').style.display = 'none';
          document.getElementById('mainPage').style.display = 'block';
        } else {
          // 비학교 계정일 경우: 경고 후 세션 제거하고 튕겨내기[cite: 1]
          alert('접근 권한이 없습니다. 이화 학교 구글 계정(@ewha.hs.kr)으로만 이용할 수 있습니다.');[cite,1]
          await supabaseClient.auth.signOut();
          showLoginPage();
        }
      } else {
        // 로그인 세션이 없다면 첫 로그인 화면 띄우기
        showLoginPage();
      }
    }

    function showLoginPage() {
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('mainPage').style.display = 'none';
    }

    // 웹앱 창이 로딩되자마자 로그인 상태 확인 시작
    window.onload = checkUserSession;

    // [기능 1] 계열 선택 제어 및 세부 전공 생성
    function updateSubCategories() {
      const checkedMain = Array.from(document.querySelectorAll('#mainCategoryGroup input:checked'));
      
      if (checkedMain.length > 2) {
        alert("계열은 최대 2개까지만 선택할 수 있습니다.");[cite, 1]
        const clickedCheckbox = window.event ? window.event.target : null;
        if (clickedCheckbox) {
          clickedCheckbox.checked = false;
        } else {
          checkedMain[checkedMain.length - 1].checked = false;
        }
        return; 
      }

      const subGroup = document.getElementById('subCategoryGroup');
      subGroup.innerHTML = ''; 

      if (checkedMain.length === 0) {
        subGroup.innerHTML = '<span style="color:#aaa; font-size:14px;">먼저 계열을 선택해 주세요.</span>';
        return;
      }

      const activeMain = Array.from(document.querySelectorAll('#mainCategoryGroup input:checked'));
      activeMain.forEach(input => {
        const mainCat = input.value;
        if (majorData[mainCat]) {
          majorData[mainCat].forEach(major => {
            const id = `sub_${major.replace(/ /g, '_')}`;
            
            const inputEl = document.createElement('input');
            inputEl.type = 'checkbox';
            inputEl.id = id;
            inputEl.value = major;
            inputEl.onchange = function() { checkSubLimit(this); };

            const labelEl = document.createElement('label');
            labelEl.className = 'checkbox-label';
            labelEl.htmlFor = id;
            labelEl.innerText = major;

            subGroup.appendChild(inputEl);
            subGroup.appendChild(labelEl);
          });
        }
      });
    }

    // [기능 2] 세부 전공 제한
    function checkSubLimit(checkbox) {
      const checkedSub = document.querySelectorAll('#subCategoryGroup input:checked');
      if (checkedSub.length > 2) {
        alert("세부 전공은 최대 2개까지만 선택할 수 있습니다.");[cite, 1]
        checkbox.checked = false; 
      }
    }

    // [기능 3] 책 추천받기
    // [기능 3] Supabase 데이터베이스에서 전공에 맞는 책 직접 가져오기!
   // [기능 3] Supabase 데이터베이스에서 전공에 맞는 책 직접 가져오기! (랜덤 새로고침 버전)
    async function getRecommendations() {
      // 1. 사용자가 선택한 세부 전공 목록 가져오기 (예: ["의학", "약학"])
      const checkedSubs = Array.from(document.querySelectorAll('#subCategoryGroup input:checked')).map(el => el.value);

      if (checkedSubs.length === 0) {
        alert('세부 전공을 최소 1개 이상 선택해 주세요!');
        return;
      }

      try {
        // 2. [수정] 우리가 만든 CSV 구조에 맞게 'category' 대신 'sub_major' 컬럼에서 매칭되는 책을 가져옵니다.
        // .in()을 쓰면 유저가 선택한 세부 전공(최대 2개)에 해당하는 모든 책들을 데이터베이스에서 싹 긁어옵니다.
        const { data, error } = await supabaseClient
          .from('book')
          .select('*')
          .in('sub_major', checkedSubs);

        if (error) throw error;

        if (!data || data.length === 0) {
          document.getElementById('bookshelf').innerHTML = `<p class="no-results">Supabase에 선택하신 전공 관련 등록된 도서가 없습니다.</p>`;
          return;
        }

        // 3. [핵심] 가져온 책 목록을 무작위(Random)로 사정없이 섞어버립니다! (버튼 누를 때마다 새로고침 효과)
        const shuffledBooks = data.sort(() => 0.5 - Math.random());

        // 4. 랜덤하게 섞인 책들 중에서 상위 3권만 쏙 골라서 담아줍니다.
        recommendedBooks = shuffledBooks.slice(0, 3); 

        // 5. 책꽂이 UI를 그려주는 함수 실행!
        displayBookshelf(); 
      } catch (error) {
        console.error('Supabase 데이터 가져오기 실패:', error);
        alert('데이터베이스에서 책 정보를 불러오지 못했습니다.');
      }
    }

    // [참고] 책꽂이 UI 그려주는 함수도 데이터베이스 컬럼명에 맞게 깔끔하게 정돈해 줍니다.
    function displayBookshelf() {
      const bookshelf = document.getElementById('bookshelf');
      bookshelf.innerHTML = '';

      recommendedBooks.forEach((book, index) => {
        const bookEl = document.createElement('div');
     bookEl.className = 'book';
        
        // 💡 팁: 따뜻한 도서관 분위기의 책 색상들을 무작위로 입혀줍니다.
        const bookColors = ['#4A7051', '#8B5A2B', '#5C4033', '#3b5941', '#6f4e37'];
        bookEl.style.backgroundColor = bookColors[index % bookColors.length];
        
        bookEl.onclick = () => openModal(book); 
        bookEl.innerHTML = `<span>${book.title}</span>`;
        bookshelf.appendChild(bookEl);
      });
    }

    // [기능 4] 책을 클릭했을 때 줄거리와 난이도가 나오는 상세 모달창[cite: 1]
  function openModal(book) {
  const modal = document.getElementById('bookModal');
  modal.style.display = 'flex'; 
  
  // HTML 내부의 form 태그는 깔끔하게 기본 상태로 둡니다.
  modal.innerHTML = `
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <div style="overflow: hidden;">
        <div class="book-img" style="font-size: 50px; text-align: center; background: #e8f0ea; padding: 15px; border-radius: 5px;">📖</div>
        <h3 style="margin-top: 0; margin-bottom: 10px;">${book.title}</h3>
        <p style="margin: 5px 0; font-size:14px; color:#555;"><strong>계열:</strong> ${book.category} | <strong>세부 전공:</strong> ${book.sub_major || '없음'}</p>
        <p style="margin: 5px 0; font-size:14px; color:#555;"><strong>추천 난이도:</strong> <span class="badge-level">${book.difficulty || '미정'}</span></p>
      </div>
      <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
      <p style="line-height:1.6; color:#333; margin: 0; max-height: 200px; overflow-y: auto;">${book.summary || '등록된 줄거리 정보가 없습니다.'}</p> 
      <p style="color: #4A7051; font-weight: bold; font-size: 14px; margin-top: 15px; letter-spacing: 0.5px;">${book.keywords || ''}</p>
      <hr style="border:0; border-top:2px dashed #4A7051; margin:25px 0 15px 0;">
      <h4 style="margin-bottom: 15px; color: #111;">💬 학생들의 리뷰 (<span id="reviewCount">0</span>)</h4>
      
      <form id="reviewForm" style="display:flex; flex-direction:column; gap:10px; margin-bottom:25px;">
        <input type="text" id="reviewNickname" placeholder="닉네임 (최대 10자)" required maxlength="10" style="padding:10px; border:1px solid #cbd5e0; border-radius:6px; font-size:14px;">
        <select id="reviewRating" style="padding:10px; border:1px solid #cbd5e0; border-radius:6px; font-size:14px;" required>
            <option value="5">⭐⭐⭐⭐⭐ (5점)</option>
            <option value="4">⭐⭐⭐⭐ (4점)</option>
            <option value="3">⭐⭐⭐ (3점)</option>
            <option value="2">⭐⭐ (2점)</option>
            <option value="1">⭐ (1점)</option>
        </select>
        <textarea id="reviewContent" placeholder="이 책을 읽고 어땠나요?" required style="padding:10px; border:1px solid #cbd5e0; border-radius:6px; font-size:14px; resize:vertical; min-height:80px;"></textarea>
        <button type="submit" style="background:#4A7051; color:white; border:none; padding:12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:15px;">리뷰 등록하기</button>
      </form>
      <div id="reviewList" style="display:flex; flex-direction:column; gap:15px; max-height:200px; overflow-y:auto;"></div>
    </div>
  `;
  
  // 💥 [핵심] HTML이 그려진 직후, 자바스크립트가 직접 폼 제출 이벤트를 가로챕니다. (절대 안 터지는 방식)
  document.getElementById('reviewForm').addEventListener('submit', function(event) {
    submitReview(event, book.title);
  });

  // 모달이 열릴 때 해당 책의 기존 리뷰들을 Supabase에서 불러옵니다.
  loadReviews(book.title);
}

    // [기능 추가] 마이페이지 열기
    async function openMyPage() {
      // 1. 팝업창을 먼저 화면에 띄웁니다. (가운데 정렬을 위해 flex 사용)
      document.getElementById('myPageModal').style.display = 'flex';

      // 2. 현재 로그인한 유저의 정보를 Supabase에서 가져옵니다.
      const { data: { session } } = await supabaseClient.auth.getSession();
      
      if (session && session.user) {
        // 아이디(이메일)를 화면에 찍어줍니다.
        document.getElementById('myUserId').innerText = session.user.email;
        
        /* 
          💡 [해커톤 다음 단계 꿀팁]
          나중에 Supabase에 'reviews' 테이블을 만들면 여기서 내 리뷰 개수와 하트 수를 
          진짜로 불러오는 코드를 작성할 수 있습니다. 지금은 화면 시연용으로 0개로 고정해 둡니다!
        */
        document.getElementById('myReviewCount').innerText = '0개';
        document.getElementById('myHeartCount').innerText = '0개';
      }
    }
    // ... (위쪽 코드들은 그대로 두세요) ...

    function closeModal() {
      document.getElementById('bookModal').style.display = 'none';
    }

    // 💥 바로 여기! closeModal() 바로 밑에 이 두 함수를 쏙 넣어주시면 됩니다!
    async function submitReview(event, bookTitle) {
      event.preventDefault(); // 폼 전송 시 새로고침 방지
      const nickname = document.getElementById('reviewNickname').value;
      const rating = document.getElementById('reviewRating').value;
      const content = document.getElementById('reviewContent').value;

      try {
        const { error } = await supabaseClient
          .from('reviews') // 👈 Supabase 리뷰 테이블 이름
          .insert([{ 
            book_title: bookTitle, 
            nickname: nickname, 
            rating: Number(rating), 
            content: content 
          }]);

        if (error) throw error;

        alert('리뷰가 성공적으로 등록되었습니다! 🎉');
        document.getElementById('reviewForm').reset(); // 입력창 비우기
        loadReviews(bookTitle); // 목록 새로고침
      } catch (error) {
        console.error(error);
        alert('리뷰 등록 실패! (Supabase에 reviews 테이블이 없거나 보안에 막혔을 수 있습니다)');
      }
    }

    async function loadReviews(bookTitle) {
      try {
        const { data, error } = await supabaseClient
          .from('reviews')
          .select('*')
          .eq('book_title', bookTitle);

        if (error) throw error;

        // 실시간 리뷰 개수 카운트 반영
        document.getElementById('reviewCount').innerText = data.length;

        const reviewListEl = document.getElementById('reviewList');
        reviewListEl.innerHTML = ''; 

        if (data.length === 0) {
          reviewListEl.innerHTML = '<p style="color:#999; font-size:14px; text-align:center; margin:15px 0;">아직 리뷰가 없습니다. 첫 리뷰를 남겨보세요!</p>';
          return;
        }

        data.forEach(review => {
          const reviewEl = document.createElement('div');
          reviewEl.style.cssText = 'background:#f7f9fa; padding:12px; border-radius:8px; border-left:4px solid #4A7051; margin-bottom:8px; text-align:left;';
          const stars = '⭐'.repeat(Number(review.rating));
          reviewEl.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:13px; color:#666;">
              <strong>${review.nickname}</strong>
              <span>${stars}</span>
            </div>
            <p style="margin:0; font-size:14px; color:#333; white-space:pre-wrap;">${review.content}</p>
          `;
          reviewListEl.appendChild(reviewEl);
        });
      } catch (error) {
        console.error(error);
      }
    }
    // 💥 여기까지 붙여넣기 끝!

   async function openMyPage() {
      // (기존 마이페이지 여는 코드 복원)
      document.getElementById('myPageModal').style.display = 'flex';
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session && session.user) {
        document.getElementById('myUserId').innerText = session.user.email;
      }
    } 
    // [기능 추가] 마이페이지 닫기
    function closeMyPage() {
      document.getElementById('myPageModal').style.display = 'none';
    }
    // [기능 수정] 완벽하게 초기화되는 로그아웃 처리
    async function handleLogout() {
      // 1. 브라우저에 찍힌 Supabase 로그인 도장 지우기
      await supabaseClient.auth.signOut(); 
      
      alert('안전하게 로그아웃 되었습니다.');
      
      // 2. 웹페이지를 강제로 새로고침해서 완전 처음 상태로 되돌리기!
      window.location.reload(); 
    }
  </script>
